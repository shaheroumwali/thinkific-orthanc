version: '3.5'

services:
  orthanc-42:
    image: jodogne/orthanc-plugins
    ports:
      - '4242:4242'
      - '8042:8042'
    volumes:
      # Config
      - ./config/42/orthanc.json:/etc/orthanc/orthanc.json:ro
      - ./config/42/transcodeAndForward.lua:/etc/share/orthanc/scripts/transcodeAndForward.lua
      # Persist data
      - ./volumes/42/:/var/lib/orthanc/db/
    command: '/etc/orthanc --verbose'

  proxy-42:
    image: nginx:1.15-alpine
    ports:
      - "8002:80"
      - "8443:443"
    volumes:
      - ./config/42/nginx.conf:/etc/nginx/nginx.conf:ro
      - web-root:/var/www/html
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    depends_on:
      - orthanc-42
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - web-root:/var/www/html
    depends_on:
      - proxy-42
    command: certonly --webroot --webroot-path=/var/www/html --email shaheroumwali@gmail.com --agree-tos --no-eff-email --staging -d thinkificpacsdev.duckdns.org

volumes:
  certbot-etc:
  certbot-var:
  web-root:
