worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    client_max_body_size 5000M;
    keepalive_timeout 65;
    keepalive_requests 100;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    upstream orthanc-server {
        server orthanc-42:8042;
        keepalive 32;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name pacs.ctread.ca;

        location ^~ /dicom-web/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin '*' always;
                add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header Access-Control-Allow-Headers 'Authorization,Accept,Origin,Content-Type,Range' always;
                add_header Access-Control-Max-Age 1728000;
                return 204;
            }
            proxy_pass http://orthanc-server/dicom-web/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
            proxy_read_timeout 300;
            proxy_hide_header Access-Control-Allow-Origin;
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization,Accept,Origin,Content-Type,Range' always;
        }

        location / {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin '*' always;
                add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header Access-Control-Allow-Headers 'Authorization,Accept,Origin,Content-Type,Range' always;
                add_header Access-Control-Max-Age 1728000;
                return 204;
            }
            proxy_pass http://orthanc-server/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_redirect off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
            proxy_read_timeout 300;
            proxy_hide_header Access-Control-Allow-Origin;
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization,Accept,Origin,Content-Type,Range' always;
        }
    }
}