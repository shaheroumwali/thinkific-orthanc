worker_processes 1;
events { worker_connections 1024; }
http {
    client_max_body_size 5000M;

    upstream orthanc-server {
        server orthanc-42:8042;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name pacs.ctread.ca;

        location ^~ /dicom-web/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin '*' always;
                add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header Access-Control-Allow-Headers 'Authorization,Accept,Origin,Content-Type,Range' always;
                add_header Access-Control-Max-Age 1728000;
                return 204;
            }
            proxy_pass http://orthanc-server/dicom-web/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_hide_header Access-Control-Allow-Origin;
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization,Accept,Origin,Content-Type,Range' always;
        }

        location / {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin '*' always;
                add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header Access-Control-Allow-Headers 'Authorization,Accept,Origin,Content-Type,Range' always;
                add_header Access-Control-Max-Age 1728000;
                return 204;
            }
            proxy_pass http://orthanc-server/;
            proxy_redirect off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_hide_header Access-Control-Allow-Origin;
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization,Accept,Origin,Content-Type,Range' always;
        }
    }
}