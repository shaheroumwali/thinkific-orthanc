user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 5000M;

    # Matches your Docker service name 'orthanc-42'
    upstream orthanc { 
        server orthanc-42:8042; 
    }

    server {
        listen      80;
        server_name thinkificpacsdev.duckdns.org;
        return 301  https://$host$request_uri;
    }

    server {
        listen      443 ssl http2;
        server_name thinkificpacsdev.duckdns.org;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        # ─── THE CRITICAL FIX FOR YOUR 404 ───────────────────────────
        # The '^~' ensures Nginx proxies this instead of looking for files
        location ^~ /dicom-web/ {
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization,Accept,Origin,Content-Type,Range' always;
                return 204;
            }

            # Map the external /dicom-web/ to the internal /dicom-web/
            proxy_pass       http://orthanc/dicom-web/; 
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # CORS headers
            proxy_hide_header Access-Control-Allow-Origin;
            add_header Access-Control-Allow-Origin '$http_origin' always;
            add_header Access-Control-Allow-Credentials 'true' always;
        }

        # ─── Fallback for Orthanc Explorer ───────────────────────────
        location / {
            proxy_pass       http://orthanc;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_hide_header Access-Control-Allow-Origin;
            add_header Access-Control-Allow-Origin '$http_origin' always;
            add_header Access-Control-Allow-Credentials 'true' always;
        }
    }
}