version: '3.5'

services:
  orthanc-42:
    image: jodogne/orthanc-plugins
    ports:
      - '4242:4242'
      - '8042:8042'
    volumes:
      # Config
      - ./config/42/orthanc.json:/etc/orthanc/orthanc.json:ro
      - ./config/42/transcodeAndForward.lua:/etc/share/orthanc/scripts/transcodeAndForward.lua
      # Persist data
      - ./volumes/42/:/var/lib/orthanc/db/
    command: '/etc/orthanc --verbose'

  proxy-42:
    image: nginx:1.15-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/42/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/thinkificpacsdev.duckdns.org/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/thinkificpacsdev.duckdns.org/privkey.pem:/etc/nginx/certs/privkey.pem:ro
    depends_on:
      - orthanc-42
    restart: unless-stopped
