worker_processes 1;

events { worker_connections 1024; }

http {
    client_max_body_size 5000M;

    upstream orthanc-server {
        server orthanc-42:8042;
    }

    server {
        listen [::]:80 default_server;
        listen 80;
        server_name thinkificpacsdev.duckdns.org;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/html;
        }

